<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>San Diego Summer Heat — DSC 106</title>

  <!-- D3.js (only plotting library allowed) -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    /* ── Reset & base ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f7f9fc;
      color: #222;
    }

    /* ── Page layout ─────────────────────────────────────────────── */
    header {
      background: #1a2b45;
      color: #fff;
      padding: 2rem 3rem;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.4rem; }
    header p  { font-size: 0.95rem; opacity: 0.75; max-width: 680px; }

    main {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    /* ── Controls bar ────────────────────────────────────────────── */
    #controls {
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
      background: #fff;
      border: 1px solid #dde3ec;
      border-radius: 8px;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .control-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      white-space: nowrap;
    }
    .control-group select,
    .control-group input[type="range"] {
      font-size: 0.85rem;
      border: 1px solid #ccd3de;
      border-radius: 4px;
      padding: 0.25rem 0.5rem;
      background: #f7f9fc;
      cursor: pointer;
    }
    #window-value {
      font-size: 0.85rem;
      font-weight: 600;
      color: #1a2b45;
      min-width: 4ch;
    }

    /* ── Chart card ──────────────────────────────────────────────── */
    #chart-card {
      background: #fff;
      border: 1px solid #dde3ec;
      border-radius: 8px;
      padding: 1.5rem 1.5rem 1rem;
      margin-bottom: 1.5rem;
    }

    #chart-subtitle {
      font-size: 0.82rem;
      color: #666;
      margin-bottom: 1rem;
      min-height: 1.2em;
    }

    #reset-zoom {
      display: none;
      margin-left: 1rem;
      font-size: 0.78rem;
      font-weight: 600;
      color: #1a2b45;
      background: #e4e9f2;
      border: 1px solid #c5cfe0;
      border-radius: 4px;
      padding: 0.15rem 0.55rem;
      cursor: pointer;
      text-decoration: none;
      vertical-align: middle;
    }
    #reset-zoom:hover { background: #d0d9ec; }

    /* Main chart SVG */
    #main-chart { width: 100%; display: block; }

    /* Brush/context SVG sits directly below */
    #brush-chart { width: 100%; display: block; margin-top: 0.5rem; }

    /* ── Tooltip ─────────────────────────────────────────────────── */
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(26, 43, 69, 0.92);
      color: #fff;
      font-size: 0.82rem;
      padding: 0.55rem 0.85rem;
      border-radius: 6px;
      line-height: 1.6;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 100;
    }
    #tooltip.visible { opacity: 1; }

    /* ── Legend ──────────────────────────────────────────────────── */
    .legend { font-size: 0.82rem; }

  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────── -->
<header>
  <h1>San Diego Summer Heat: August Near-Surface Temperatures (1850–2014)</h1>
  <p>
    Exploring how summer temperatures in San Diego have shifted over 164 years
    using CESM2 historical climate model output from the CMIP6 dataset.
  </p>
</header>

<!-- ── Tooltip (single shared instance) ──────────────────────────── -->
<div id="tooltip"></div>

<main>

  <!-- ── Controls ───────────────────────────────────────────────── -->
  <div id="controls">

    <!-- Baseline period selector -->
    <div class="control-group">
      <label for="baseline-select">Baseline period</label>
      <select id="baseline-select">
        <option value="1850-1900" selected>1850 – 1900  (pre-industrial)</option>
        <option value="1950-1980">1950 – 1980  (mid-century)</option>
        <option value="1981-2010">1981 – 2010  (modern reference)</option>
      </select>
    </div>

    <!-- Rolling mean window slider -->
    <div class="control-group">
      <label for="window-slider">Smoothing window</label>
      <input id="window-slider" type="range" min="3" max="30" step="1" value="10" />
      <span id="window-value">10 yr</span>
    </div>

  </div>

  <!-- ── Main chart card ─────────────────────────────────────────── -->
  <div id="chart-card">
    <p id="chart-subtitle">
      <span id="subtitle-text"></span>
      <a id="reset-zoom" href="#">× Reset zoom</a>
    </p>
    <svg id="main-chart"></svg>
    <svg id="brush-chart"></svg>
  </div>

</main>

<!-- ── D3 implementation ───────────────────────────────────────────── -->
<script>
// ================================================================
//  CONFIGURATION
// ================================================================
const CONFIG = {
  // Dimensions
  margin:      { top: 20, right: 30, bottom: 30, left: 55 },
  brushHeight: 60,   // height of the context/brush strip

  // Visual
  lineColor:    "steelblue",
  meanColor:    "darkorange",
  lineOpacity:  0.45,
  lineWidth:    1.5,
  meanWidth:    3,
  dotRadius:    2.5,

  // Data file (export from Python notebook)
  dataPath: "data/sd_august.csv",   // columns: year, temperature
};

// ================================================================
//  STATE  (mutated by controls and brush)
// ================================================================
const state = {
  baseline:    [1850, 1900],
  window:      10,
  brushExtent: null,   // [yearMin, yearMax] or null = full range
};

// ================================================================
//  GLOBALS  (set after data loads)
// ================================================================
let allData    = [];   // [{year, temperature}]
let mainSvg, brushSvg;
let xMain, yMain, xBrush, yBrush;
let xAxisMain, yAxisMain;
let mainG, brushG;
let brush;   // d3 brush instance — kept global for programmatic clear

// ================================================================
//  HELPERS
// ================================================================

/** Compute rolling mean (centred window) */
function rollingMean(data, window) {
  const half = Math.floor(window / 2);
  return data.map((d, i) => {
    const slice = data.slice(
      Math.max(0, i - half),
      Math.min(data.length, i + half + 1)
    );
    return {
      year: d.year,
      mean: d3.mean(slice, s => s.temperature),
    };
  });
}

/** Compute baseline mean for the selected period */
function baselineMean(data, [y0, y1]) {
  return d3.mean(
    data.filter(d => d.year >= y0 && d.year <= y1),
    d => d.temperature
  );
}

/** Update the subtitle text and reset-zoom visibility */
function updateSubtitle() {
  const [b0, b1] = state.baseline;
  d3.select("#subtitle-text").text(
    `Anomaly relative to ${b0}–${b1} mean  ·  ${state.window}-year rolling mean shown in orange`
  );
  const btn = document.getElementById("reset-zoom");
  btn.style.display = state.brushExtent ? "inline-block" : "none";
}

// ================================================================
//  DRAW
// ================================================================

function draw(dur = 400) {
  // ── 1. filter to brush extent ──────────────────────────────────
  const visible = state.brushExtent
    ? allData.filter(d => d.year >= state.brushExtent[0] && d.year <= state.brushExtent[1])
    : allData;

  // ── 2. compute anomaly ─────────────────────────────────────────
  const bMean = baselineMean(allData, state.baseline);
  const plotData = visible.map(d => ({
    year:        d.year,
    temperature: d.temperature,
    anomaly:     d.temperature - bMean,
  }));

  // ── 3. rolling mean ────────────────────────────────────────────
  const smoothed = rollingMean(plotData, state.window);

  // ── 4. update scales ───────────────────────────────────────────
  xMain.domain(d3.extent(plotData, d => d.year));
  yMain.domain([
    d3.min(plotData, d => d.anomaly) - 0.3,
    d3.max(plotData, d => d.anomaly) + 0.3,
  ]);

  // ── 5. update axes ─────────────────────────────────────────────
  mainG.select(".x-axis").transition().duration(dur).call(xAxisMain);
  mainG.select(".y-axis").transition().duration(dur).call(yAxisMain);

  // ── 6. zero baseline ──────────────────────────────────────────
  mainG.select(".zero-line")
    .transition().duration(dur)
    .attr("y1", yMain(0)).attr("y2", yMain(0));

  // ── 7. raw temperature line ───────────────────────────────────
  const lineFn = d3.line()
    .x(d => xMain(d.year))
    .y(d => yMain(d.anomaly))
    .defined(d => !isNaN(d.anomaly));

  mainG.select(".raw-line")
    .datum(plotData)
    .transition().duration(dur)
    .attr("d", lineFn);

  // ── 8. dots (for tooltip hover) ───────────────────────────────
  const dots = mainG.select(".dots-group")
    .selectAll("circle")
    .data(plotData, d => d.year);

  dots.enter().append("circle")
      .attr("r", CONFIG.dotRadius)
      .attr("fill", CONFIG.lineColor)
      .attr("opacity", 0.6)
    .merge(dots)
      .attr("cx", d => xMain(d.year))
      .attr("cy", d => yMain(d.anomaly));

  dots.exit().remove();

  // ── 9. rolling mean line ──────────────────────────────────────
  const meanFn = d3.line()
    .x(d => xMain(d.year))
    .y(d => yMain(d.mean - bMean))
    .defined(d => !isNaN(d.mean));

  mainG.select(".mean-line")
    .datum(smoothed)
    .transition().duration(dur)
    .attr("d", meanFn);

  updateSubtitle();
}

// ================================================================
//  TOOLTIP
// ================================================================
function attachTooltip() {
  const tooltip = d3.select("#tooltip");

  mainG.select(".dots-group")
    .selectAll("circle")
    .on("mouseover", function(event, d) {
      const bMean = baselineMean(allData, state.baseline);
      const anomaly = (d.anomaly >= 0 ? "+" : "") + d.anomaly.toFixed(2);
      tooltip
        .classed("visible", true)
        .html(
          `<strong>${d.year}</strong><br>` +
          `Temp: ${d.temperature.toFixed(2)} K<br>` +
          `Anomaly: ${anomaly} K`
        );
      d3.select(this).attr("r", CONFIG.dotRadius * 2);
    })
    .on("mousemove", function(event) {
      tooltip
        .style("left", (event.clientX + 14) + "px")
        .style("top",  (event.clientY - 28) + "px");
    })
    .on("mouseout", function() {
      tooltip.classed("visible", false);
      d3.select(this).attr("r", CONFIG.dotRadius);
    });
}

// ================================================================
//  BRUSH (context strip)
// ================================================================
function initBrush(fullExtent) {
  brush = d3.brushX()
    .extent([[0, 0], [xBrush.range()[1], CONFIG.brushHeight - 15]])
    .on("brush", function(event) {
      // Called on every pixel of drag — use dur=0 to avoid transition queue lag
      if (event.selection) {
        state.brushExtent = event.selection.map(xBrush.invert).map(Math.round);
        draw(0);
        attachTooltip();
      }
    })
    .on("end", function(event) {
      if (!event.selection) {
        state.brushExtent = null;
        draw(400);
      } else {
        state.brushExtent = event.selection.map(xBrush.invert).map(Math.round);
        draw(0);
      }
      attachTooltip();
    });

  // draw context line
  const contextLine = d3.line()
    .x(d => xBrush(d.year))
    .y(d => yBrush(d.temperature));

  brushG.append("path")
    .datum(allData)
    .attr("class", "context-line")
    .attr("fill", "none")
    .attr("stroke", CONFIG.lineColor)
    .attr("stroke-width", 1)
    .attr("opacity", 0.4)
    .attr("d", contextLine);

  brushG.append("g")
    .attr("class", "brush")
    .call(brush);
}

// ================================================================
//  INIT  (called once after data loads)
// ================================================================
function init(data) {
  allData = data;

  // ── sizing ────────────────────────────────────────────────────
  const cardWidth  = document.getElementById("chart-card").clientWidth - 48;
  const { margin, brushHeight } = CONFIG;
  const mainHeight = Math.round(cardWidth * 0.42);
  const innerW = cardWidth - margin.left - margin.right;
  const innerH = mainHeight - margin.top  - margin.bottom;

  // ── main SVG ──────────────────────────────────────────────────
  mainSvg = d3.select("#main-chart")
    .attr("viewBox", `0 0 ${cardWidth} ${mainHeight}`)
    .attr("height", mainHeight);

  mainG = mainSvg.append("g")
    .attr("transform", `translate(${margin.left},${margin.top})`);

  // scales
  xMain = d3.scaleLinear().range([0, innerW]);
  yMain = d3.scaleLinear().range([innerH, 0]);

  // axes
  xAxisMain = d3.axisBottom(xMain).tickFormat(d3.format("d")).ticks(10);
  yAxisMain = d3.axisLeft(yMain).ticks(6)
    .tickFormat(d => (d >= 0 ? "+" : "") + d.toFixed(1) + " K");

  mainG.append("g").attr("class", "x-axis")
    .attr("transform", `translate(0,${innerH})`);
  mainG.append("g").attr("class", "y-axis");

  // y-axis label
  mainG.append("text")
    .attr("transform", "rotate(-90)")
    .attr("y", -margin.left + 12)
    .attr("x", -innerH / 2)
    .attr("text-anchor", "middle")
    .attr("font-size", "0.75rem")
    .attr("fill", "#555")
    .text("Temperature Anomaly [K]");

  // zero baseline
  mainG.append("line")
    .attr("class", "zero-line")
    .attr("x1", 0).attr("x2", innerW)
    .attr("stroke", "#888").attr("stroke-width", 1)
    .attr("stroke-dasharray", "4 3").attr("opacity", 0.7);

  // path elements (drawn in draw())
  mainG.append("path").attr("class", "raw-line")
    .attr("fill", "none")
    .attr("stroke", CONFIG.lineColor)
    .attr("stroke-width", CONFIG.lineWidth)
    .attr("opacity", CONFIG.lineOpacity);

  mainG.append("g").attr("class", "dots-group");

  mainG.append("path").attr("class", "mean-line")
    .attr("fill", "none")
    .attr("stroke", CONFIG.meanColor)
    .attr("stroke-width", CONFIG.meanWidth);

  // legend
  const legend = mainG.append("g")
    .attr("class", "legend")
    .attr("transform", `translate(${innerW - 180}, 4)`);

  [
    { color: CONFIG.lineColor, label: "August Temperature", opacity: CONFIG.lineOpacity + 0.2 },
    { color: CONFIG.meanColor, label: `Rolling Mean`,       opacity: 1 },
  ].forEach(({ color, label, opacity }, i) => {
    const row = legend.append("g").attr("transform", `translate(0, ${i * 18})`);
    row.append("line")
      .attr("x1", 0).attr("x2", 18)
      .attr("y1", 6).attr("y2", 6)
      .attr("stroke", color).attr("stroke-width", 2).attr("opacity", opacity);
    row.append("text")
      .attr("x", 22).attr("y", 10)
      .attr("font-size", "0.75rem").attr("fill", "#444")
      .text(label);
  });

  // ── brush SVG ─────────────────────────────────────────────────
  const brushSvgHeight = brushHeight + margin.bottom;
  brushSvg = d3.select("#brush-chart")
    .attr("viewBox", `0 0 ${cardWidth} ${brushSvgHeight}`)
    .attr("height", brushSvgHeight);

  brushG = brushSvg.append("g")
    .attr("transform", `translate(${margin.left}, 0)`);

  xBrush = d3.scaleLinear()
    .domain(d3.extent(allData, d => d.year))
    .range([0, innerW]);
  yBrush = d3.scaleLinear()
    .domain(d3.extent(allData, d => d.temperature))
    .range([brushHeight - 15, 0]);

  brushG.append("g")
    .attr("transform", `translate(0, ${brushHeight - 14})`)
    .call(d3.axisBottom(xBrush).tickFormat(d3.format("d")).ticks(10));

  initBrush(d3.extent(allData, d => d.year));

  // ── initial draw ──────────────────────────────────────────────
  draw();
  attachTooltip();
}

// ================================================================
//  CONTROLS
// ================================================================
document.getElementById("reset-zoom").addEventListener("click", function(e) {
  e.preventDefault();
  state.brushExtent = null;
  brushG.select(".brush").call(brush.move, null);  // clear brush highlight visually
  draw(400);
  attachTooltip();
});

d3.select("#baseline-select").on("change", function() {
  const [y0, y1] = this.value.split("-").map(Number);
  state.baseline = [y0, y1];
  draw();
  attachTooltip();
});

d3.select("#window-slider").on("input", function() {
  state.window = +this.value;
  d3.select("#window-value").text(this.value + " yr");
  draw();
  attachTooltip();
});

// ================================================================
//  LOAD DATA & KICK OFF
// ================================================================
d3.csv(CONFIG.dataPath, d => ({
  year:        +d.year,
  temperature: +d.temperature,
})).then(data => {
  init(data);
}).catch(err => {
  console.error("Could not load data:", err);
  document.getElementById("chart-card").innerHTML =
    `<p style="color:red;padding:1rem">
      Could not load <code>${CONFIG.dataPath}</code>.<br>
      Export it from the Python notebook first.
    </p>`;
});
</script>

</body>
</html>
